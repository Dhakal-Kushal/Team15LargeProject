name: Deploy MERN Application

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22.18'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          frontend/package-lock.json

    - name: Install and Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    - name: Deploy Frontend via SCP
      uses: appleboy/scp-action@v0.1.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        # Changed from password to key/passphrase
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        port: ${{ secrets.SERVER_PORT }}
        source: "frontend/dist/*"
        target: "/var/www/html"
        strip_components: 2
        rm: true

    - name: Deploy Backend via SCP
      uses: appleboy/scp-action@v0.1.5
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        # Changed from password to key/passphrase
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        port: ${{ secrets.SERVER_PORT }}
        source: "server.js,api.js,createJWT.js,sendMail.js,package.json,package-lock.json"
        target: "/var/cardsServer"
        overwrite: true

    - name: SSH Command to Restart Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        # Changed from password to key/passphrase
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /var/cardsServer
          npm ci --production
          npm list -g pm2 || npm install -g pm2
          pm2 reload express-server --update-env || pm2 start server.js --name "express-server"
          pm2 save
          sudo nginx -s reload